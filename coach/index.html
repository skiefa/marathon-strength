<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f4f1ea">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>Coach — Berlin 2026</title>
<style>
:root{
  --bg:#f4f1ea; --ink:#1a1a1a; --paper:#fdfbf6; --line:#c8c3b4;
  --accent:#d63a17; --green:#3d6b2c; --amber:#9b7c2a; --blue:#1c4a6c; --teal:#2a7a8a;
  --muted:#6b6657;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  max-width:480px;margin:0 auto;padding:env(safe-area-inset-top) 16px calc(96px + env(safe-area-inset-bottom));
  font-size:15px;line-height:1.45}
h1,h2,h3,.serif{font-family:Georgia,serif;font-style:italic;font-weight:normal}
h1{font-size:22px;margin:18px 0 2px}
h2{font-size:18px;margin:22px 0 8px}
h3{font-size:16px}
.sub{color:var(--muted);font-size:12.5px;letter-spacing:.02em}
.chips{display:flex;gap:8px;margin:10px 0 4px;flex-wrap:wrap}
.chip{background:var(--ink);color:var(--paper);border-radius:14px;padding:4px 11px;font-size:11.5px;letter-spacing:.04em}
.chip.accent{background:var(--accent)}
.chip.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:14px;margin:10px 0}
.card.brief{border-left:4px solid var(--accent)}
.card.warn{border-left:4px solid var(--amber)}
.card.note{border-left:4px solid var(--teal)}
.brief .headline{font-family:Georgia,serif;font-style:italic;font-size:17px;margin-bottom:6px}
.brief .block{margin:10px 0 0}
.brief .blocklabel{font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:3px}
.coachsays{font-family:Georgia,serif;font-style:italic;border-top:1px dashed var(--line);margin-top:12px;padding-top:9px;font-size:14.5px}
.coachsays::before{content:"Coach: ";font-weight:bold;font-style:normal;font-family:'Helvetica Neue',sans-serif;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent)}
/* day switcher */
.days{display:flex;gap:5px;margin:12px 0 2px}
.dayp{flex:1;text-align:center;border:1px solid var(--line);border-radius:9px;padding:6px 0 4px;background:var(--paper);font-size:11px;cursor:pointer;position:relative}
.dayp .dn{font-size:13px;font-weight:600;display:block}
.dayp.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.dayp.today::after{content:"";position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:2px;background:var(--accent)}
.dayp .dot{display:block;width:5px;height:5px;border-radius:3px;margin:2px auto 0;background:transparent}
.dayp .dot.done{background:var(--green)}
/* tiers + tasks */
.tierlabel{display:flex;align-items:baseline;gap:8px;margin:18px 0 4px}
.tierlabel b{font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.tierlabel .ln{flex:1;border-top:1px solid var(--line)}
.t-min b{color:var(--ink)} .t-std b{color:var(--green)} .t-bon b{color:var(--amber)} .t-act b{color:var(--blue)}
.task{display:flex;align-items:flex-start;gap:11px;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin:7px 0;cursor:pointer}
.task .box{width:22px;height:22px;border:2px solid var(--ink);border-radius:7px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--paper)}
.task.done .box{background:var(--green);border-color:var(--green)}
.task.done .tn{text-decoration:line-through;opacity:.5}
.task.skipped{opacity:.45}
.task.skipped .box{border-style:dashed}
.task .tn{font-weight:600;font-size:14.5px}
.task .td{font-size:12px;color:var(--muted);margin-top:1px}
.task .twhy{font-size:12px;color:var(--muted);margin-top:5px;display:none;font-style:italic;font-family:Georgia,serif}
.task.open .twhy{display:block}
.task .skipbtn{margin-left:auto;border:none;background:none;color:var(--muted);font-size:16px;padding:2px 4px;flex-shrink:0}
/* feel checkin */
.feelrow{display:flex;gap:8px;margin-top:8px}
.feelbtn{flex:1;border:1px solid var(--line);background:var(--paper);border-radius:9px;padding:9px 0;font-size:13px;cursor:pointer}
.feelbtn.sel{background:var(--ink);color:var(--paper);border-color:var(--ink)}
/* week */
.wkcard{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:10px 13px;margin:7px 0;cursor:pointer}
.wkcard .wkd{width:36px;font-weight:600}
.wkcard .wkinfo{flex:1;font-size:12.5px;color:var(--muted)}
.wkcard .wkinfo b{color:var(--ink);font-weight:600;font-size:13.5px;display:block;font-style:italic;font-family:Georgia,serif}
.wkcard .wkc{font-size:12px;color:var(--green);font-weight:600}
.zone{margin:9px 0}
.zone .zl{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px}
.zbar{height:7px;background:#e7e2d6;border-radius:4px;overflow:hidden}
.zfill{height:100%;border-radius:4px;background:var(--green)}
.zfill.low{background:var(--accent)} .zfill.mid{background:var(--amber)}
/* journal */
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px;font-size:15px;background:var(--paper);font-family:inherit;color:var(--ink)}
textarea{min-height:70px;resize:vertical}
.frow{display:flex;gap:8px;margin:8px 0}
.frow>div{flex:1}
label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:block;margin-bottom:3px}
.btn{display:block;width:100%;background:var(--accent);color:#fff;border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:600;margin:12px 0;cursor:pointer}
.btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
.jentry{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:12px;margin:8px 0;font-size:13.5px}
.jentry .jh{display:flex;justify-content:space-between;align-items:baseline}
.jentry .jh b{font-family:Georgia,serif;font-style:italic;font-size:15px}
.jentry .jmeta{color:var(--muted);font-size:12px;margin:4px 0}
.jentry .del{color:var(--muted);background:none;border:none;font-size:12px;text-decoration:underline;cursor:pointer}
.pill-alert{background:#f3e9e5;border:1px solid var(--accent);color:var(--accent);border-radius:9px;padding:8px 12px;font-size:12.5px;margin:8px 0}
/* trends */
.spark{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:12px;margin:9px 0}
.spark .sl{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;margin-bottom:5px}
.spark .sl b{font-size:14px}
.spark .sv{font-family:Georgia,serif;font-style:italic;font-size:17px}
/* wissen subtabs */
.subtabs{display:flex;gap:6px;margin:12px 0;flex-wrap:wrap}
.subtab{border:1px solid var(--line);background:var(--paper);border-radius:16px;padding:6px 13px;font-size:13px;cursor:pointer}
.subtab.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.guide{background:var(--paper);border:1px solid var(--line);border-radius:11px;margin:7px 0;overflow:hidden}
.guide .gh{padding:11px 13px;font-weight:600;font-size:14px;cursor:pointer;display:flex;justify-content:space-between}
.guide .gb{display:none;padding:0 13px 12px;font-size:13.5px}
.guide.open .gb{display:block}
.guide .gb p{margin:6px 0}
.guide .gb .gl{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.tip{border-left:4px solid var(--line)}
.tip.now{border-left-color:var(--accent)}
.tip .when{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);margin-bottom:3px}
/* tab bar */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:var(--paper);border-top:1px solid var(--line);display:flex;
  padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
.tab{flex:1;text-align:center;font-size:10.5px;color:var(--muted);padding:5px 0;cursor:pointer;border:none;background:none;font-family:inherit}
.tab .ti{font-size:19px;display:block;margin-bottom:1px}
.tab.active{color:var(--accent);font-weight:600}
.view{display:none} .view.active{display:block}
ul.clean{list-style:none}
ul.clean li{padding:4px 0 4px 18px;position:relative;font-size:13.5px}
ul.clean li::before{content:"—";position:absolute;left:0;color:var(--accent)}
.small{font-size:12.5px;color:var(--muted)}
</style>
</head>
<body>

<div id="header"></div>

<div id="view-heute" class="view active"></div>
<div id="view-woche" class="view"></div>
<div id="view-buch" class="view"></div>
<div id="view-trends" class="view"></div>
<div id="view-wissen" class="view"></div>

<nav class="tabbar">
  <button class="tab active" data-v="heute"><span class="ti">☀︎</span>Heute</button>
  <button class="tab" data-v="woche"><span class="ti">▦</span>Woche</button>
  <button class="tab" data-v="buch"><span class="ti">✎</span>Buch</button>
  <button class="tab" data-v="trends"><span class="ti">↗</span>Trends</button>
  <button class="tab" data-v="wissen"><span class="ti">✳</span>Wissen</button>
</nav>

<script>
/* ================= STAMMDATEN ================= */
const RACES = [
  { id:'hm',     name:'München HM',      date:'2026-07-05', taper:'2026-06-28' },
  { id:'berlin', name:'Berlin-Marathon', date:'2026-09-27', taper:'2026-09-07' },
];
const PHASES = [
  { name:'Base',              start:'2026-04-01', end:'2026-05-17' },
  { name:'Build 1',           start:'2026-05-18', end:'2026-06-28' },
  { name:'Taper HM',          start:'2026-06-29', end:'2026-07-04' },
  { name:'Race: München HM',  start:'2026-07-05', end:'2026-07-05' },

  { name:'Race: Berlin!',     start:'2026-09-27', end:'2026-09-27' },
  { name:'Post-Saison',       start:'2026-09-28', end:'2026-12-31' },
];

const PROGRESSION = {
  'mo-lunge':    { phase1:'Bodyweight · 2×45s', phase2:'2×5kg KH · 3×45s', phase3:'2×5kg KH · 2×45s' },
  'mo-bulgarian':{ phase1:'Bodyweight · 2×45s', phase2:'2×6kg KH · 3×45s', phase3:'2×5kg KH · 2×45s' },
  'mo-knee':     { phase1:'Theraband leicht · 3×15', phase2:'Theraband mittel · 3×20', phase3:'Theraband leicht · 2×15' },
  'mi-sldl':     { phase1:'Bodyweight · 3×8', phase2:'1×8kg KH · 3×8', phase3:'1×6kg KH · 2×8' },
  'fr-stepup':   { phase1:'Bodyweight · 3×8', phase2:'6–8kg KH · 3×8', phase3:'4kg KH · 2×8' },

const TASKS = [
  { id:'mo-kraft', day:1, tier:'pflicht', name:'Kraft Coach-Plan', duration:'30 min', trigger:'morgens oder mittags', why:'Ganzkörper-Stabi mit Bein-Anteil. Bulgarian Split + Reverse Lunge stärken knieumgebende Muskulatur.', problems:['knie','po'] },
  { id:'mo-sideplank', day:1, tier:'pflicht', name:'Side Plank', duration:'3 min · 2×30s pro Seite', trigger:'nach Kraft', why:'1. von 3× Woche. Vom Orthopäden verordnet. Glute medius gegen Patella-Lateralisation.', problems:['patella','knie','stabilitaet'] },
  { id:'mo-hipthrust', day:1, tier:'pflicht', name:'Hip Thrust', duration:'5 min · 3×10', trigger:'nach Kraft', why:'1. von 3× Woche. Beste Glute-Aktivierung — deine wichtigste Schwachstelle laut Diagnose.', problems:['po','huefte'] },
  { id:'mo-beckenboden', day:1, tier:'pflicht', name:'Beckenboden-Training', duration:'3 min', trigger:'morgens oder vor Kraft', why:'1. von 3× Woche. Für Frauen 50+ in Marathon-Vorbereitung wesentlich.', problems:['stabilitaet'] },
  { id:'mo-knee', day:1, tier:'standard', name:'Knee Extension Theraband', duration:'5 min', trigger:'direkt nach Kraft', why:'VMO (innerer Quadrizeps) zieht Patella zurück. 2×/Woche (Mo+Fr).', problems:['knie','patella'] },

  { id:'mo-bulgarian', day:1, tier:'bonus', name:'Bulgarian Split Squat (separat)', duration:'5 min', trigger:'falls nicht im Coach-Plan', why:'Ist normalerweise im Coach-Plan. Hier nur separat als zusätzliche Dosis.', problems:['knie','po'] },
  { id:'di-aktivierung', day:2, tier:'pflicht', name:'Pre-Run Aktivierung', duration:'3 min', trigger:'direkt vor Lauf', why:'Clams + Glute Bridge + Monster Walks wecken Po auf. Schlafender Po = Kompensation.', problems:['po','huefte','knie'] },

  { id:'di-atem', day:2, tier:'pflicht', name:'Atemübung (Garmin)', duration:'5 min', trigger:'direkt nach Cool-Down', why:'Parasympathisches Runterfahren. HRV-Rebound nach Intervall.', problems:['recovery'] },
  { id:'di-wade', day:2, tier:'standard', name:'Wadenheber', duration:'1 min · 20×+10× einbeinig', trigger:'nach dem Lauf', why:'Achillessehne im ermüdeten Zustand stärken — am wirksamsten.', problems:['achilles','shinSplints'] },
  { id:'mi-kraft', day:3, tier:'pflicht', name:'Kraft Coach-Plan', duration:'30 min', trigger:'morgens', why:'Zweite Kraft-Session. Volumen für muskuläre Adaption.', problems:['knie','po'] },
  { id:'mi-sideplank', day:3, tier:'pflicht', name:'Side Plank', duration:'3 min · 2×30s pro Seite', trigger:'nach Kraft', why:'2. von 3× Woche. Vom Orthopäden verordnet.', problems:['patella','knie','stabilitaet'] },
  { id:'mi-hipthrust', day:3, tier:'pflicht', name:'Hip Thrust', duration:'5 min · 3×10', trigger:'nach Kraft', why:'2. von 3× Woche. Po-Aufbau braucht Frequenz.', problems:['po','huefte'] },
  { id:'mi-beckenboden', day:3, tier:'pflicht', name:'Beckenboden-Training', duration:'3 min', trigger:'morgens oder vor Kraft', why:'2. von 3× Woche. Stabilität von innen, schützt vor Stressinkontinenz bei Lauf-Impact.', problems:['stabilitaet'] },
  { id:'mi-sldl', day:3, tier:'standard', name:'Single Leg Deadlift', duration:'5 min · 3×8 pro Seite', trigger:'nach Kraft', why:'Exzentrisches Hamstring-Training. Schützt Sehnenansatz. 2×/Woche (Mi+Sa).', problems:['po','huefte'] },
  { id:'mi-schwimmen', day:3, tier:'activity', name:'Schwimmen', duration:'~60 min', trigger:'abends', why:'Cross-Training, gelenkfreundlich. Recovery für die Beine.', problems:['recovery'] },

  { id:'fr-hipthrust', day:5, tier:'pflicht', name:'Hip Thrust', duration:'5 min · 3×10', trigger:'nach Kraft', why:'3. von 3× Woche. Po-Frequenz für echten Aufbau.', problems:['po','huefte'] },

  { id:'fr-stepup', day:5, tier:'bonus', name:'Kettlebell Step-Up', duration:'5 min · 3×8 pro Seite', trigger:'falls Zeit nach Kraft', why:'1×/Woche reicht — Coach-Plan deckt einbeinige Kraft schon ab. Hier als Zusatzdosis.', problems:['knie','po'] },
  { id:'sa-rad', day:6, tier:'activity', name:'Radfahren (alternativ)', duration:'45 min · 35 TSS', trigger:'lt. Coach-Plan', why:'Ausdauer ohne Lauf-Belastung.', problems:['recovery'] },
  { id:'sa-sldl', day:6, tier:'standard', name:'Single Leg Deadlift', duration:'5 min · 3×8 pro Seite', trigger:'morgens', why:'2. von 2× Woche. Hamstring + Glute.', problems:['po','huefte'] },

  { id:'sa-soleus', day:6, tier:'bonus', name:'Bent-Knee Calf Raise', duration:'2 min · 3×15', trigger:'morgens', why:'Soleus (tiefe Wade). Ergänzt normale Wadenheber — 1×/Woche als Variation.', problems:['achilles','shinSplints'] },

  { id:'so-wade', day:0, tier:'standard', name:'Wadenheber', duration:'1 min · 20×+10× einbeinig', trigger:'nach Long Run', why:'Achillessehne nach längstem Lauf der Woche. Tag 4.', problems:['achilles','shinSplints'] },

  { id:'daily-birddog', day:'daily', tier:'bonus', name:'Bird Dog', duration:'2 min · 2×8 pro Seite', trigger:'irgendwann zwischendurch', why:'Rumpf + Hüft-Stabilität gleichzeitig. Lauf-spezifisch (diagonale Verbindung).', problems:['stabilitaet','po'] },
];

const REGEN_TASKS = [
  { id:'regen-faszien', tier:'pflicht', name:'Faszienrolle', duration:'10 min', trigger:'morgens', why:'Quads, IT-Band, Wade ausrollen. Nach Long Run Pflicht.', problems:['knie','patella'] },
  { id:'regen-spazieren', tier:'pflicht', name:'Spaziergang', duration:'20–30 min', trigger:'irgendwann', why:'Aktive Erholung fördert Durchblutung ohne Belastung.', problems:['recovery'] },
  { id:'regen-beine', tier:'pflicht', name:'Beine hochlegen', duration:'10 min', trigger:'abends', why:'Venösen Rückfluss fördern. Schwellung reduzieren.', problems:['recovery'] },
  { id:'regen-huefte', tier:'standard', name:'Hüftöffner + Psoas-Dehnung', duration:'5 min', trigger:'nach Spaziergang', why:'Nach Long Run verkürzt sich der Psoas. Jetzt dehnen.', problems:['huefte'] },

const KEY = 'coach-v2';
let S = loadState();
function loadState(){
  try { return Object.assign({done:{},skipped:{},feel:{},achilles:{},journal:[],regenMo:{},briefDone:{}}, JSON.parse(localStorage.getItem(KEY)||'{}')); }
  catch(e){ return {done:{},skipped:{},feel:{},achilles:{},journal:[],regenMo:{},briefDone:{}}; }
}
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }

let viewingDate = null;
let activeView = 'heute';
let wissenTab = 'fueling';

/* ================= HELPERS ================= */
function todayKey(d){ d = d || new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseLocal(s){ const p=s.split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
function getViewingDate(){ return viewingDate || todayKey(); }
function daysUntil(dateStr){ const ms = parseLocal(dateStr) - parseLocal(todayKey()); return Math.round(ms/86400000); }
function getWeekStart(dk){ const d = parseLocal(dk||todayKey()); const dow=(d.getDay()+6)%7; d.setDate(d.getDate()-dow); return d; }
function fmtDate(dk){ const d=parseLocal(dk); return ['So','Mo','Di','Mi','Do','Fr','Sa'][d.getDay()]+', '+d.getDate()+'.'+(d.getMonth()+1)+'.'; }
function getPhase(dk){ dk = dk||todayKey(); return PHASES.find(p=>dk>=p.start && dk<=p.end) || PHASES[PHASES.length-1]; }
function phaseId(){ const w = Math.ceil(daysUntil(RACES[1].date)/7); if(w>11) return 'phase1'; if(w>=5) return 'phase2'; return 'phase3'; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function tasksForDay(dk){
  const dow = parseLocal(dk).getDay();
  let base;
  if (dow===1 && S.regenMo[dk]) base = REGEN_TASKS.map(t=>({...t, id:t.id}));
  else base = TASKS.filter(t=>t.day===dow);
  const daily = TASKS.filter(t=>t.day==='daily').map(t=>({...t, id:t.id+'-'+dk}));
  return base.concat(daily);
}
function isDone(id,dk){ return !!(S.done[dk]&&S.done[dk][id]); }
function isSkipped(id,dk){ return !!(S.skipped[dk]&&S.skipped[dk][id]); }
function toggleDone(id,dk){ S.done[dk]=S.done[dk]||{}; S.done[dk][id]=!S.done[dk][id]; if(S.done[dk][id]&&S.skipped[dk])delete S.skipped[dk][id]; save(); render(); }
function toggleSkip(id,dk){ S.skipped[dk]=S.skipped[dk]||{}; S.skipped[dk][id]=!S.skipped[dk][id]; if(S.skipped[dk][id]&&S.done[dk])delete S.done[dk][id]; save(); render(); }
function toggleBrief(dk,i){ S.briefDone[dk]=S.briefDone[dk]||{}; S.briefDone[dk][i]=!S.briefDone[dk][i]; save(); render(); }
function setFeel(dk,v){ S.feel[dk] = (S.feel[dk]===v? null : v); save(); render(); }
function setAchilles(dk,v){ S.achilles[dk] = (S.achilles[dk]===v? null : v); save(); render(); }

/* ================= RENDER: HEUTE ================= */
function renderDays(){
  const ws = getWeekStart(getViewingDate());
  let html = '<div class="days">';
  for(let i=0;i<7;i++){
    const d = new Date(ws); d.setDate(ws.getDate()+i);
    const dk = todayKey(d);
    const tasks = tasksForDay(dk).filter(t=>t.tier==='pflicht');
    const allDone = tasks.length && tasks.every(t=>isDone(t.id,dk)||isSkipped(t.id,dk));
    html += `<div class="dayp ${dk===getViewingDate()?'active':''} ${dk===todayKey()?'today':''}" onclick="viewingDate='${dk}';render()">
      ${['Mo','Di','Mi','Do','Fr','Sa','So'][i]}<span class="dn">${d.getDate()}</span><span class="dot ${allDone?'done':''}"></span></div>`;
  }
  return html+'</div>';
}

function renderBriefing(dk){
  const b = DATA.briefings[dk];
  if(!b) return `<div class="card note"><div class="small">${COACH_FALLBACK[0]}</div></div>`;
  const bd = S.briefDone[dk]||{};
  const items = (list, prefix) => list.map((t,i)=>{
    const id = prefix+i;
    return `<div class="task ${bd[id]?'done':''}" onclick="toggleBrief('${dk}','${id}')">
      <div class="box">${bd[id]?'✓':''}</div><div><div class="tn">${esc(t)}</div></div></div>`;
  }).join('');
  return `<div class="card brief">
    <div class="headline">${esc(b.headline)}</div>
    <div class="small">${esc(b.kalender)}</div>
    <div class="block"><div class="blocklabel">Die Einheit</div><div>${esc(b.einheit)}</div></div>
    <div class="block"><div class="blocklabel">Minimum — das zählt</div>${items(b.minimum,'min')}</div>
    ${b.bonus && b.bonus.length? `<div class="block"><div class="blocklabel">Bonus — wenn der Tag es hergibt</div>${items(b.bonus,'bon')}</div>`:''}
    <div class="block"><div class="blocklabel">Fueling</div><ul class="clean">${b.fueling.map(f=>'<li>'+esc(f)+'</li>').join('')}</ul></div>
    <div class="block"><div class="blocklabel">⚠ Im Blick</div><div class="small" style="color:var(--ink)">${esc(b.warnung)}</div></div>
    <div class="coachsays">${esc(b.coachSays)}</div>
  </div>`;
}

function renderFeel(dk){
  if(dk!==todayKey()) return '';
  const f = S.feel[dk], a = S.achilles[dk];
  return `<div class="card">
    <b style="font-size:13.5px">Morgen-Check</b> <span class="small">— gleich nach dem Aufstehen</span>
    <div class="small" style="margin-top:8px">Wie ist der Akku?</div>
    <div class="feelrow">
      <button class="feelbtn ${f==='gut'?'sel':''}" onclick="setFeel('${dk}','gut')">Gut 💪</button>
      <button class="feelbtn ${f==='okay'?'sel':''}" onclick="setFeel('${dk}','okay')">Okay</button>
      <button class="feelbtn ${f==='platt'?'sel':''}" onclick="setFeel('${dk}','platt')">Platt</button>
    </div>
    ${f==='platt'? '<div class="pill-alert">Verstanden. Heute zählt nur das Minimum — Standard und Bonus sind gestrichen, nicht verschoben. Ausruhen ist eine Trainingsentscheidung.</div>':''}
    <div class="small" style="margin-top:8px">Achillessehne beim Aufstehen?</div>

      <button class="feelbtn ${a==='ok'?'sel':''}" onclick="setAchilles('${dk}','ok')">Locker</button>
      <button class="feelbtn ${a==='kurz'?'sel':''}" onclick="setAchilles('${dk}','kurz')">Steif &lt;5 min</button>
      <button class="feelbtn ${a==='lang'?'sel':''}" onclick="setAchilles('${dk}','lang')">Steif &gt;5 min</button>

function renderTask(t, dk){
  const done = isDone(t.id,dk), skip = isSkipped(t.id,dk);
  const prog = PROGRESSION[t.id.replace(/-\d{4}-\d{2}-\d{2}$/,'')];
  const pchip = prog? ` · ${prog[phaseId()]}` : '';
  return `<div class="task ${done?'done':''} ${skip?'skipped':''}" onclick="toggleDone('${t.id}','${dk}')">
    <div class="box">${done?'✓':''}</div>
    <div style="flex:1">
      <div class="tn">${esc(t.name)}</div>
      <div class="td">${esc(t.duration)} · ${esc(t.trigger)}${esc(pchip)}</div>
      <div class="twhy">${esc(t.why)}</div>
    </div>
    <button class="skipbtn" onclick="event.stopPropagation();toggleSkip('${t.id}','${dk}')" title="Überspringen">${skip?'↩':'✕'}</button>
  </div>`;
}

function renderHeute(){
  const dk = getViewingDate();
  const dow = parseLocal(dk).getDay();
  const tasks = tasksForDay(dk);
  const platt = S.feel[dk]==='platt';
  const groups = [
    {key:'pflicht', label:'Minimum', cls:'t-min'},
    {key:'activity', label:'Lauf & Aktivität', cls:'t-act'},
    {key:'standard', label:'Standard', cls:'t-std'},
    {key:'bonus', label:'Bonus', cls:'t-bon'},
  ];
  let html = renderDays();
  html += renderFeel(dk);
  html += renderBriefing(dk);

  if(dow===1){
    html += `<div class="card note"><b style="font-size:13.5px">Gestern Long Run gewesen?</b>
      <div class="feelrow">
        <button class="feelbtn ${S.regenMo[dk]?'sel':''}" onclick="setRegen('${dk}',true)">Ja → Regen-Tag</button>
        <button class="feelbtn ${S.regenMo[dk]===false?'sel':''}" onclick="setRegen('${dk}',false)">Nein → normal</button>
      </div></div>`;
  }
  for(const g of groups){
    const ts = tasks.filter(t=>t.tier===g.key);
    if(!ts.length) continue;
    if(platt && (g.key==='standard'||g.key==='bonus')) continue;
    html += `<div class="tierlabel ${g.cls}"><b>${g.label}</b><span class="ln"></span></div>`;
    html += ts.map(t=>renderTask(t,dk)).join('');
  }
  // Abend-Hinweis auf morgen
  if(dk===todayKey() && new Date().getHours()>=16){
    const tm = new Date(); tm.setDate(tm.getDate()+1);
    const tk = todayKey(tm);
    if(DATA.briefings[tk]) html += `<div class="card brief" style="cursor:pointer" onclick="viewingDate='${tk}';render();window.scrollTo(0,0)">
      <div class="blocklabel" style="font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--accent)">Abend-Ritual</div>
      <div class="headline" style="margin:4px 0 2px">Dein Plan für morgen steht →</div>
      <div class="small">${esc(DATA.briefings[tk].headline)}</div></div>`;
  }
  document.getElementById('view-heute').innerHTML = html;
}

/* ================= RENDER: WOCHE ================= */
function calcCoverage(){
  const ws = getWeekStart(todayKey());
  const counts = {};
  for(let i=0;i<7;i++){
    const d = new Date(ws); d.setDate(ws.getDate()+i);
    const dk = todayKey(d);
    tasksForDay(dk).forEach(t=>{
      if(isDone(t.id,dk)) (t.problems||[]).forEach(p=>counts[p]=(counts[p]||0)+1);
    });
  }
  return counts;
}
function renderWoche(){
  let html = '';
  if(DATA.woche){
    html += `<div class="card brief"><div class="blocklabel" style="font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)">Wochen-Fokus</div>
      <div style="margin-top:4px">${esc(DATA.woche.fokus)}</div>
      ${DATA.woche.luecken && DATA.woche.luecken.length? `<div class="block" style="margin-top:10px"><div class="blocklabel">Offene Lücken</div><ul class="clean">${DATA.woche.luecken.map(l=>'<li>'+esc(l)+'</li>').join('')}</ul></div>`:''}
    </div>`;
  }
  html += '<h2>Die Woche</h2>';
  const ws = getWeekStart(todayKey());
  for(let i=0;i<7;i++){
    const d = new Date(ws); d.setDate(ws.getDate()+i);
    const dk = todayKey(d);
    const ts = tasksForDay(dk).filter(t=>t.tier==='pflicht');
    const done = ts.filter(t=>isDone(t.id,dk)).length;
    const b = DATA.briefings[dk];
    const act = tasksForDay(dk).filter(t=>t.tier==='activity').map(t=>t.name).join(', ');
    html += `<div class="wkcard" onclick="viewingDate='${dk}';switchView('heute')">
      <div class="wkd">${['Mo','Di','Mi','Do','Fr','Sa','So'][i]}<br><span class="small">${d.getDate()}.</span></div>
      <div class="wkinfo">${b? '<b>'+esc(b.headline)+'</b>' : ''}${esc(act||'')}</div>
      <div class="wkc">${done}/${ts.length}</div>
    </div>`;
  }
  html += '<h2>Körper-Abdeckung diese Woche</h2><div class="card">';
  const cov = calcCoverage();
  for(const z of COVERAGE_ZONES){
    const c = cov[z.id]||0;
    const pct = Math.min(100, Math.round(c/z.target*100));
    const cls = c<z.low? 'low' : (pct<70?'mid':'');
    html += `<div class="zone"><div class="zl"><span>${esc(z.name)}</span><span>${c}/${z.target}</span></div>
      <div class="zbar"><div class="zfill ${cls}" style="width:${pct}%"></div></div></div>`;
  }
  html += '</div>';
  document.getElementById('view-woche').innerHTML = html;
}

/* ================= RENDER: TAGEBUCH ================= */
function saveJournal(){
  const g = id=>document.getElementById(id).value;
  const e = {
    datum: g('j-datum'), art: g('j-art'),
    km: g('j-km')? parseFloat(g('j-km')) : null,
    dauer_min: g('j-dauer')? parseInt(g('j-dauer')) : null,
    anstrengung_1_10: g('j-rpe')? parseInt(g('j-rpe')) : null,
    knie_0_10: g('j-knie')? parseInt(g('j-knie')) : null,
    achilles_0_10: g('j-achilles')? parseInt(g('j-achilles')) : null,
    stimmung_1_5: g('j-stimmung')? parseInt(g('j-stimmung')) : null,
    notizen: g('j-notiz') || '',
    ts: new Date().toISOString()
  };
  if(!e.datum) return;
  S.journal.unshift(e); save(); render();
  const pain = Math.max(e.knie_0_10||0, e.achilles_0_10||0);
  if(pain>=4) alert('Notiert. Schmerz ≥4/10 — das beobachten wir. Wenn es beim nächsten Lauf wieder auftaucht: 2 Tage Pause-Regel, kein Heldentum.');
}
function delJournal(i){ if(confirm('Eintrag löschen?')){ S.journal.splice(i,1); save(); render(); } }
function exportJournal(){
  const md = S.journal.slice().reverse().map(e=>
`---
datum: ${e.datum}
art: ${e.art}
km: ${e.km==null?'null':e.km}
dauer_min: ${e.dauer_min==null?'null':e.dauer_min}
anstrengung_1_10: ${e.anstrengung_1_10==null?'null':e.anstrengung_1_10}
knie_schmerz_0_10: ${e.knie_0_10==null?'null':e.knie_0_10}
achilles_0_10: ${e.achilles_0_10==null?'null':e.achilles_0_10}
stimmung_1_5: ${e.stimmung_1_5==null?'null':e.stimmung_1_5}
---
${e.notizen}
`).join('\n');
  if(navigator.share){ navigator.share({title:'Trainingstagebuch', text:md}).catch(()=>{}); }

}

/* ================= RENDER: TRENDS ================= */
function sparkSVG(vals, color){
  const w=300, h=54, pad=4;
  const mn=Math.min(...vals), mx=Math.max(...vals);
  const x=i=> pad + i*(w-2*pad)/(vals.length-1);
  const y=v=> mx===mn? h/2 : h-pad-(v-mn)*(h-2*pad)/(mx-mn);
  const pts = vals.map((v,i)=>x(i).toFixed(1)+','+y(v).toFixed(1)).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${x(vals.length-1)}" cy="${y(vals[vals.length-1])}" r="3.5" fill="${color}"/></svg>`;
}
function isoWeek(dk){ const d=parseLocal(dk); const ws=getWeekStart(dk); return todayKey(ws); }
function renderTrends(){
  let html = '';
  if(DATA.datenstand) html += `<div class="pill-alert">Wearable-Daten bis ${fmtDate(DATA.datenstand.wearables)} — ${esc(DATA.datenstand.kommentar)}</div>`;
  if(DATA.trends && DATA.trends.wochen && DATA.trends.wochen.length){
    const W = DATA.trends.wochen;
    const series = [
      {key:'hrv', name:'HRV (Wochenschnitt)', unit:'ms', color:'#2a7a8a', goodUp:true},
      {key:'rhr', name:'Ruhepuls', unit:'bpm', color:'#d63a17', goodUp:false},
      {key:'schlaf', name:'Schlaf', unit:'h', color:'#1c4a6c', goodUp:true},
    ];
    html += '<h2>Körper-Trends</h2>';
    for(const s of series){
      const vals = W.map(w=>w[s.key]).filter(v=>v!=null);
      const last = vals[vals.length-1], first = vals[0];
      html += `<div class="spark"><div class="sl"><b>${s.name}</b><span class="sv">${last} ${s.unit}</span></div>
        ${sparkSVG(vals, s.color)}
        <div class="small">${fmtDate(W[0].woche)} → ${fmtDate(W[W.length-1].woche)} · Start: ${first} ${s.unit}</div></div>`;
    }
    if(DATA.trends.kommentar) html += `<div class="card"><div class="coachsays" style="border:none;margin:0;padding:0">${esc(DATA.trends.kommentar)}</div></div>`;
  }
  // km pro Woche: Mac-Journal (data.json) ist Quelle der Wahrheit, App-Tagebuch nur Fallback
  let byWeek = {}, kmQuelle = '';
  if(DATA.trends && DATA.trends.kmWochen && DATA.trends.kmWochen.length){
    DATA.trends.kmWochen.forEach(w=>{ byWeek[w.woche]=w.km; });
    kmQuelle = 'Quelle: dein Journal auf dem Mac';
  } else {
    S.journal.filter(e=>e.km!=null).forEach(e=>{ const wk=isoWeek(e.datum); byWeek[wk]=(byWeek[wk]||0)+e.km; });
    kmQuelle = 'Quelle: App-Tagebuch';
  }
  const weeks = Object.keys(byWeek).sort();
  if(weeks.length){
    html += '<h2>Deine Kilometer</h2><div class="card">';
    const mx = Math.max(...weeks.map(w=>byWeek[w]));
    weeks.forEach(w=>{
      html += `<div class="zone"><div class="zl"><span>Woche ab ${fmtDate(w)}</span><span>${byWeek[w].toFixed(1)} km</span></div>
        <div class="zbar"><div class="zfill" style="width:${Math.round(byWeek[w]/mx*100)}%"></div></div></div>`;
    });
    html += `<div class="small" style="margin-top:6px">${kmQuelle}</div></div>`;
  }
  if(DATA.beweise && DATA.beweise.length){
    html += '<h2>Beweise, dass du besser wirst</h2>';
    html += DATA.beweise.map(b=>`<div class="card brief"><div class="headline" style="font-size:15.5px">${esc(b.titel)}</div><div class="small" style="color:var(--ink)">${esc(b.text)}</div></div>`).join('');
  }
  document.getElementById('view-trends').innerHTML = html;
}

    html += `<div class="card note"><div class="small">Dein Körper, deine Diagnosen, deine Übungen — warum was wofür da ist.</div></div>`;
    html += PROBLEMS.map(p=>`<div class="guide"><div class="gh" onclick="this.parentElement.classList.toggle('open')">${esc(p.name)}<span>＋</span></div>
      <div class="gb"><p>${esc(p.desc)}</p><p><span class="gl">Deine Übungen dafür</span></p><ul class="clean">${p.exercises.map(e=>'<li>'+esc(e)+'</li>').join('')}</ul></div></div>`).join('');
  }
  document.getElementById('view-wissen').innerHTML = html;
}

/* ================= NAV + BOOT ================= */
function switchView(v){
  activeView = v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.v===v));
  render();
  window.scrollTo(0,0);
}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchView(t.dataset.v)));

function render(){
  renderHeader();
  if(activeView==='heute') renderHeute();
  if(activeView==='woche') renderWoche();
  if(activeView==='buch') renderBuch();
  if(activeView==='trends') renderTrends();
  if(activeView==='wissen') renderWissen();
}

fetch('data.json?v='+Date.now())
  .then(r=>r.json())
  .then(d=>{ DATA = Object.assign(DATA, d); render(); })
  .catch(()=>{ render(); });
render();
</script>
</body>
</html>
