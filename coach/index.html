<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Berlin 27.9.">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f4f1ea">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>Coach — Berlin 2026</title>
<style>
:root{
  --bg:#f4f1ea; --ink:#1a1a1a; --paper:#fdfbf6; --line:#c8c3b4;
  --accent:#d63a17; --green:#3d6b2c; --amber:#9b7c2a; --blue:#1c4a6c; --teal:#2a7a8a;
  --muted:#57534a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  max-width:480px;margin:0 auto;padding:env(safe-area-inset-top) 16px calc(96px + env(safe-area-inset-bottom));
  font-size:17px;line-height:1.5}
h1,h2,h3,.serif{font-family:Georgia,serif;font-style:italic;font-weight:normal}
h1{font-size:26px;margin:18px 0 2px}
h2{font-size:21px;margin:22px 0 8px}
h3{font-size:18px}
.sub{color:var(--muted);font-size:15px;letter-spacing:.02em}
.chips{display:flex;gap:8px;margin:10px 0 4px;flex-wrap:wrap}
.chip{background:var(--ink);color:var(--paper);border-radius:14px;padding:4px 11px;font-size:13.5px;letter-spacing:.04em}
.chip.accent{background:var(--accent)}
.chip.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:14px;margin:10px 0}
.card.brief{border-left:4px solid var(--accent)}
.card.warn{border-left:4px solid var(--amber)}
.card.note{border-left:4px solid var(--teal)}
.brief .headline{font-family:Georgia,serif;font-style:italic;font-size:20px;margin-bottom:6px}
.brief .block{margin:10px 0 0}
.brief .blocklabel{font-size:13px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:3px}
.coachsays{font-family:Georgia,serif;font-style:italic;border-top:1px dashed var(--line);margin-top:12px;padding-top:9px;font-size:17px}
.coachsays::before{content:"Coach: ";font-weight:bold;font-style:normal;font-family:'Helvetica Neue',sans-serif;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent)}
/* day switcher */
.days{display:flex;gap:5px;margin:12px 0 2px}
.dayp{flex:1;text-align:center;border:1px solid var(--line);border-radius:9px;padding:6px 0 4px;background:var(--paper);font-size:13px;cursor:pointer;position:relative}
.dayp .dn{font-size:15.5px;font-weight:600;display:block}
.dayp.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.dayp.today::after{content:"";position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:2px;background:var(--accent)}
.dayp .dot{display:block;width:5px;height:5px;border-radius:3px;margin:2px auto 0;background:transparent}
.dayp .dot.done{background:var(--green)}
/* tiers + tasks */
.tierlabel{display:flex;align-items:baseline;gap:8px;margin:18px 0 4px}
.tierlabel b{font-size:13px;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.tierlabel .ln{flex:1;border-top:1px solid var(--line)}
.t-min b{color:var(--ink)} .t-std b{color:var(--green)} .t-bon b{color:var(--amber)} .t-act b{color:var(--blue)} .t-nach b{color:var(--teal)}
.task{display:flex;align-items:flex-start;gap:11px;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin:7px 0;cursor:pointer}
.task .box{width:26px;height:26px;border:2px solid var(--ink);border-radius:8px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:16.5px;color:var(--paper)}
.task.done .box{background:var(--green);border-color:var(--green)}
.task.done .tn{text-decoration:line-through;opacity:.5}
.task.skipped{opacity:.45}
.task.skipped .box{border-style:dashed}
.task .tn{font-weight:600;font-size:17px}
.task .td{font-size:14.5px;color:var(--muted);margin-top:1px}
.task .twhy{font-size:14.5px;color:var(--muted);margin-top:5px;display:none;font-style:italic;font-family:Georgia,serif}
.task.open .twhy{display:block}
.task .skipbtn{margin-left:auto;border:none;background:none;color:var(--muted);font-size:18px;padding:2px 4px;flex-shrink:0}
/* feel checkin */
.feelrow{display:flex;gap:8px;margin-top:8px}
.feelbtn{flex:1;border:1px solid var(--line);background:var(--paper);border-radius:9px;padding:9px 0;font-size:15.5px;cursor:pointer}
.feelbtn.sel{background:var(--ink);color:var(--paper);border-color:var(--ink)}
/* week */
.wkcard{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:10px 13px;margin:7px 0;cursor:pointer}
.wkcard .wkd{width:36px;font-weight:600}
.wkcard .wkinfo{flex:1;font-size:15px;color:var(--muted)}
.wkcard .wkinfo b{color:var(--ink);font-weight:600;font-size:16px;display:block;font-style:italic;font-family:Georgia,serif}
.wkcard .wkc{font-size:14.5px;color:var(--green);font-weight:600}
.zone{margin:9px 0}
.zone .zl{display:flex;justify-content:space-between;font-size:15px;margin-bottom:3px}
.zbar{height:7px;background:#e7e2d6;border-radius:4px;overflow:hidden}
.zfill{height:100%;border-radius:4px;background:var(--green)}
.zfill.low{background:var(--accent)} .zfill.mid{background:var(--amber)}
/* journal */
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px;font-size:17px;background:var(--paper);font-family:inherit;color:var(--ink)}
textarea{min-height:70px;resize:vertical}
.frow{display:flex;gap:8px;margin:8px 0}
.frow>div{flex:1}
label{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:block;margin-bottom:3px}
.btn{display:block;width:100%;background:var(--accent);color:#fff;border:none;border-radius:11px;padding:13px;font-size:17px;font-weight:600;margin:12px 0;cursor:pointer}
.btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
.micbtn{width:62px;height:62px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:26px;cursor:pointer}
.micbtn.rec{background:var(--green);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.jentry{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:12px;margin:8px 0;font-size:16px}
.jentry .jh{display:flex;justify-content:space-between;align-items:baseline}
.jentry .jh b{font-family:Georgia,serif;font-style:italic;font-size:17px}
.jentry .jmeta{color:var(--muted);font-size:14.5px;margin:4px 0}
.jentry .del{color:var(--muted);background:none;border:none;font-size:14.5px;text-decoration:underline;cursor:pointer}
.pill-alert{background:#f3e9e5;border:1px solid var(--accent);color:var(--accent);border-radius:9px;padding:8px 12px;font-size:15px;margin:8px 0}
/* trends */
.spark{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:12px;margin:9px 0}
.spark .sl{display:flex;justify-content:space-between;align-items:baseline;font-size:15px;margin-bottom:5px}
.spark .sl b{font-size:16.5px}
.spark .sv{font-family:Georgia,serif;font-style:italic;font-size:20px}
/* wissen subtabs */
.subtabs{display:flex;gap:6px;margin:12px 0;flex-wrap:wrap}
.subtab{border:1px solid var(--line);background:var(--paper);border-radius:16px;padding:6px 13px;font-size:15.5px;cursor:pointer}
.subtab.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.guide{background:var(--paper);border:1px solid var(--line);border-radius:11px;margin:7px 0;overflow:hidden}
.guide .gh{padding:11px 13px;font-weight:600;font-size:16.5px;cursor:pointer;display:flex;justify-content:space-between}
.guide .gb{display:none;padding:0 13px 12px;font-size:16px}
.guide.open .gb{display:block}
.guide .gb p{margin:6px 0}
.guide .gb .gl{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.tip{border-left:4px solid var(--line)}
.tip.now{border-left-color:var(--accent)}
.tip .when{font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);margin-bottom:3px}
/* tab bar */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:var(--paper);border-top:1px solid var(--line);display:flex;
  padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
.tab{flex:1;text-align:center;font-size:13px;color:var(--muted);padding:5px 0;cursor:pointer;border:none;background:none;font-family:inherit}
.tab svg{width:23px;height:23px;display:block;margin:0 auto 2px}
.micbtn svg{width:27px;height:27px;display:block;margin:0 auto}
.tab.active{color:var(--accent);font-weight:600}
.view{display:none} .view.active{display:block}
ul.clean{list-style:none}
ul.clean li{padding:4px 0 4px 18px;position:relative;font-size:16px}
ul.clean li::before{content:"—";position:absolute;left:0;color:var(--accent)}
.small{font-size:15px;color:var(--muted)}
</style>
</head>

const TASKS = [
  { id:'mo-kraft', day:1, tier:'pflicht', name:'Kraft Coach-Plan', duration:'30 min', trigger:'morgens oder mittags', why:'Ganzkörper-Stabi mit Bein-Anteil. Bulgarian Split + Reverse Lunge stärken knieumgebende Muskulatur.', problems:['knie','po'] },

function spruchFuer(dk){
  let h = 0;
  for(const c of dk) h = (h*31 + c.charCodeAt(0)) % 9973;
  return SPRUECHE[h % SPRUECHE.length];
}

/* ================= STATE ================= */
const KEY = 'coach-v2';
let S = loadState();
function loadState(){
  try { return Object.assign({done:{},skipped:{},feel:{},achilles:{},journal:[],regenMo:{},briefDone:{},extra:{}}, JSON.parse(localStorage.getItem(KEY)||'{}')); }
  catch(e){ return {done:{},skipped:{},feel:{},achilles:{},journal:[],regenMo:{},briefDone:{},extra:{}}; }
}
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); scheduleSync(); }

/* ================= BACKUP-SYNC (privates GitHub-Repo skiefa/coach-state) =================
   Jede Änderung wird automatisch (4 s debounced) nach GitHub gesichert.
   Beim Öffnen wird der Remote-Stand geladen und per Vereinigung gemerged —
   so konvergieren auch getrennte iOS-Speicher (Safari vs. Home-Bildschirm-App). */
const SYNC_API = 'https://api.github.com/repos/skiefa/coach-state/contents/state.json';
let syncSha = null, syncTimer = null, syncBusy = false, syncQueued = false;
let SYNC = loadSync();
function loadSync(){ try { return JSON.parse(localStorage.getItem('coach-sync')||'{}'); } catch(e){ return {}; } }
function setSync(p){ SYNC = Object.assign(SYNC, p); localStorage.setItem('coach-sync', JSON.stringify(SYNC)); }
function syncToken(){ return SYNC.token || ''; }
function ghHeaders(){ return { 'Authorization':'Bearer '+syncToken(), 'Accept':'application/vnd.github+json' }; }
function b64enc(s){ return btoa(unescape(encodeURIComponent(s))); }
function b64dec(s){ return decodeURIComponent(escape(atob(String(s).replace(/\s/g,'')))); }
function scheduleSync(){ if(!syncToken()) return; setSync({dirty:true}); renderSyncCard(); clearTimeout(syncTimer); syncTimer = setTimeout(syncUp, 4000); }

async function syncUp(){
  if(!syncToken()) return;
  if(syncBusy){ syncQueued = true; return; }
  syncBusy = true;
  try {
    if(syncSha === null){
      const g = await fetch(SYNC_API, {headers: ghHeaders(), cache:'no-store'});
      if(g.status===200) syncSha = (await g.json()).sha;
      else if(g.status===404) syncSha = '';
      else throw new Error(g.status===401? 'Token ungültig oder abgelaufen' : 'HTTP '+g.status);
    }
    const content = b64enc(JSON.stringify({savedAt:new Date().toISOString(), state:S}, (k,v)=> k==='_edit'? undefined : v));
    const body = {message:'Backup', content};
    if(syncSha) body.sha = syncSha;
    let r = await fetch(SYNC_API, {method:'PUT', headers:ghHeaders(), body:JSON.stringify(body)});
    if(r.status===409 || r.status===422){
      const g = await fetch(SYNC_API, {headers: ghHeaders(), cache:'no-store'});
      if(g.status===200) body.sha = (await g.json()).sha;
      r = await fetch(SYNC_API, {method:'PUT', headers:ghHeaders(), body:JSON.stringify(body)});
    }
    if(!r.ok) throw new Error(r.status===401? 'Token ungültig oder abgelaufen' : 'HTTP '+r.status);
    syncSha = (await r.json()).content.sha;
    setSync({lastUp:new Date().toISOString(), dirty:false, error:null});
  } catch(e){
    setSync({error: String(e && e.message || e)});
  }
  syncBusy = false;
  renderSyncCard();
  if(syncQueued){ syncQueued = false; scheduleSync(); }
}

async function syncDown(){
  if(!syncToken()) return;
  try {
    const r = await fetch(SYNC_API, {headers: ghHeaders(), cache:'no-store'});
    if(r.status===404){ setSync({error:null}); scheduleSync(); return; }
    if(!r.ok) throw new Error(r.status===401? 'Token ungültig oder abgelaufen' : 'HTTP '+r.status);
    const j = await r.json(); syncSha = j.sha;
    const remote = JSON.parse(b64dec(j.content));
    const before = JSON.stringify(S);
    mergeState(remote && remote.state || {});
    const after = JSON.stringify(S);
    localStorage.setItem(KEY, after);
    setSync({lastDown:new Date().toISOString(), error:null});
    if(after !== JSON.stringify(remote && remote.state || {})) scheduleSync();
    else setSync({dirty:false});
    if(after !== before) render(); else renderSyncCard();
  } catch(e){ setSync({error:String(e && e.message || e)}); renderSyncCard(); }
}

/* Vereinigung statt Überschreiben: nichts geht verloren.
   Bei direktem Konflikt (gleicher Tag, gleiches Feld) gewinnt der lokale Wert. */
function mergeState(R){
  ['done','skipped','briefDone','extra'].forEach(k=>{ R[k]=R[k]||{}; S[k]=S[k]||{}; });
  ['done','skipped','briefDone'].forEach(k=>{
    for(const dk in R[k]) S[k][dk] = Object.assign({}, R[k][dk], S[k][dk]||{});
  });
  ['feel','achilles','regenMo'].forEach(k=>{ S[k] = Object.assign({}, R[k]||{}, S[k]||{}); });
  for(const dk in R.extra){
    const have = new Set((S.extra[dk]||[]).map(x=>x.id+'|'+x.von));
    S.extra[dk] = (S.extra[dk]||[]).concat((R.extra[dk]||[]).filter(x=>!have.has(x.id+'|'+x.von)));
  }
  const jkey = e => e.ts || (e.datum+'|'+(e.notizen||'').slice(0,60));
  const have = new Set((S.journal||[]).map(jkey));
  (R.journal||[]).forEach(e=>{ if(!have.has(jkey(e))) S.journal.push(e); });
  S.journal.sort((a,b)=> (b.datum+'|'+(b.ts||'')).localeCompare(a.datum+'|'+(a.ts||'')));
}

function saveSyncToken(){
  const el = document.getElementById('sync-token');

  setSync({token:t, error:null});

  syncDown();

}

      <input type="password" id="sync-token" placeholder="GitHub-Token (github_pat_…)" autocomplete="off">

    </div>

    ${SYNC.error||SYNC.dirty? `<button class="btn ghost" style="margin:8px 0 2px" onclick="syncSha=null;syncUp()">Jetzt sichern</button>`:''}
  </div>`;
}

let viewingDate = null;
let activeView = 'heute';
let wissenTab = 'fueling';

/* ================= HELPERS ================= */
function todayKey(d){ d = d || new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseLocal(s){ const p=s.split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
function getViewingDate(){ return viewingDate || todayKey(); }
function daysUntil(dateStr){ const ms = parseLocal(dateStr) - parseLocal(todayKey()); return Math.round(ms/86400000); }
function getWeekStart(dk){ const d = parseLocal(dk||todayKey()); const dow=(d.getDay()+6)%7; d.setDate(d.getDate()-dow); return d; }
function fmtDate(dk){ const d=parseLocal(dk); return ['So','Mo','Di','Mi','Do','Fr','Sa'][d.getDay()]+', '+d.getDate()+'.'+(d.getMonth()+1)+'.'; }
function getPhase(dk){ dk = dk||todayKey(); return PHASES.find(p=>dk>=p.start && dk<=p.end) || PHASES[PHASES.length-1]; }
function phaseId(){ const w = Math.ceil(daysUntil(RACES[1].date)/7); if(w>11) return 'phase1'; if(w>=5) return 'phase2'; return 'phase3'; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function tasksForDay(dk){
  const dow = parseLocal(dk).getDay();
  let base;
  if (dow===1 && S.regenMo[dk]) base = REGEN_TASKS.map(t=>({...t, id:t.id}));
  else base = TASKS.filter(t=>t.day===dow);
  const extra = (S.extra[dk]||[]).map((x,i)=>{
    const t = TASKS.find(tt=>tt.id===x.id);
    return t? {...t, id:'nh'+i+'-'+t.id+'-'+dk, tier:'nachgeholt', von:x.von, _nh:i} : null;
  }).filter(Boolean);
  const daily = TASKS.filter(t=>t.day==='daily').map(t=>({...t, id:t.id+'-'+dk}));
  return base.concat(extra, daily);
}
function getMissed(){
  const today = todayKey();
  const ws = getWeekStart(today);
  const moved = new Set();
  for(let i=0;i<7;i++){ const d=new Date(ws); d.setDate(ws.getDate()+i); (S.extra[todayKey(d)]||[]).forEach(x=>moved.add(x.id)); }
  const out = [];
  for(let i=0;i<7;i++){
    const d=new Date(ws); d.setDate(ws.getDate()+i);
    const dk = todayKey(d);
    if(dk>=today) break;
    const dow = parseLocal(dk).getDay();
    TASKS.filter(t=>t.day===dow && (t.tier==='pflicht'||t.tier==='standard')).forEach(t=>{
      if(!isDone(t.id,dk) && !isSkipped(t.id,dk) && !moved.has(t.id)) out.push({task:t, von:dk});
    });
  }
  return out;
}
function nachholen(id,von){ const dk=todayKey(); S.extra[dk]=S.extra[dk]||[]; S.extra[dk].push({id,von}); save(); render(); }
function removeNachgeholt(dk,i){ (S.extra[dk]||[]).splice(i,1); save(); render(); }
function isDone(id,dk){ return !!(S.done[dk]&&S.done[dk][id]); }
function isSkipped(id,dk){ return !!(S.skipped[dk]&&S.skipped[dk][id]); }
function toggleDone(id,dk){ S.done[dk]=S.done[dk]||{}; S.done[dk][id]=!S.done[dk][id]; if(S.done[dk][id]&&S.skipped[dk])delete S.skipped[dk][id]; save(); render(); }
function toggleSkip(id,dk){ S.skipped[dk]=S.skipped[dk]||{}; S.skipped[dk][id]=!S.skipped[dk][id]; if(S.skipped[dk][id]&&S.done[dk])delete S.done[dk][id]; save(); render(); }
function toggleBrief(dk,i){ S.briefDone[dk]=S.briefDone[dk]||{}; S.briefDone[dk][i]=!S.briefDone[dk][i]; save(); render(); }
function setFeel(dk,v){ S.feel[dk] = (S.feel[dk]===v? null : v); save(); render(); }
function setAchilles(dk,v){ S.achilles[dk] = (S.achilles[dk]===v? null : v); save(); render(); }
function setRegen(dk,v){ S.regenMo[dk]=v; save(); render(); }

  document.getElementById('header').innerHTML = `
    <h1>${h1}</h1>
    <div class="sub">${bln>0? 'bis Berlin · ':''}Phase: ${esc(ph.name)} · ${todayKey()===getViewingDate()? 'Heute' : fmtDate(getViewingDate())}</div>
    <div class="chips">
      ${hm>=0? `<div class="chip accent">München HM in ${hm} Tagen</div>`:''}

/* ================= RENDER: HEUTE ================= */
function renderDays(){
  const ws = getWeekStart(getViewingDate());
  let html = '<div class="days">';
  for(let i=0;i<7;i++){
    const d = new Date(ws); d.setDate(ws.getDate()+i);
    const dk = todayKey(d);
    const tasks = tasksForDay(dk).filter(t=>t.tier==='pflicht');
    const allDone = tasks.length && tasks.every(t=>isDone(t.id,dk)||isSkipped(t.id,dk));
    html += `<div class="dayp ${dk===getViewingDate()?'active':''} ${dk===todayKey()?'today':''}" onclick="viewingDate='${dk}';render()">
      ${['Mo','Di','Mi','Do','Fr','Sa','So'][i]}<span class="dn">${d.getDate()}</span><span class="dot ${allDone?'done':''}"></span></div>`;
  }
  return html+'</div>';
}

    const id = prefix+i;
    return `<div class="task ${bd[id]?'done':''}" onclick="toggleBrief('${dk}','${id}')">
      <div class="box">${bd[id]?'✓':''}</div><div><div class="tn">${esc(t)}</div></div></div>`;
  }).join('');
  return `<div class="card brief">
    <div class="headline">${esc(b.headline)}</div>
    <div class="small">${esc(b.kalender)}</div>
    <div class="block"><div class="blocklabel">Die Einheit</div><div>${esc(b.einheit)}</div></div>
    <div class="block"><div class="blocklabel">Minimum — das zählt</div>${items(b.minimum,'min')}</div>

    <div class="block"><div class="blocklabel">Fueling</div><ul class="clean">${b.fueling.map(f=>'<li>'+esc(f)+'</li>').join('')}</ul></div>

    <div class="coachsays">${esc(b.coachSays)}</div>

}

function renderTask(t, dk){
  const done = isDone(t.id,dk), skip = isSkipped(t.id,dk);
  const prog = PROGRESSION[t.id.replace(/-\d{4}-\d{2}-\d{2}$/,'').replace(/^nh\d+-/,'')];
  const pchip = prog? ` · ${prog[phaseId()]}` : '';
  const von = t.von? ` · von ${fmtDate(t.von)}` : '';
  const rmAction = t.tier==='nachgeholt'
    ? `removeNachgeholt('${dk}',${t._nh})`
    : `toggleSkip('${t.id}','${dk}')`;
  return `<div class="task ${done?'done':''} ${skip?'skipped':''}" onclick="toggleDone('${t.id}','${dk}')">
    <div class="box">${done?'✓':''}</div>
    <div style="flex:1">
      <div class="tn">${esc(t.name)}</div>
      <div class="td">${esc(t.duration)} · ${esc(t.trigger)}${esc(pchip)}${esc(von)}</div>
      <div class="twhy">${esc(t.why)}</div>
    </div>
    <button class="skipbtn" onclick="event.stopPropagation();${rmAction}" title="Entfernen">${skip?'↩':'✕'}</button>
  </div>`;
}

function renderHeute(){
  const dk = getViewingDate();
  const dow = parseLocal(dk).getDay();

  const platt = S.feel[dk]==='platt';
  const groups = [
    {key:'pflicht', label:'Minimum', cls:'t-min'},
    {key:'nachgeholt', label:'Nachgeholt', cls:'t-nach'},
    {key:'activity', label:'Lauf & Aktivität', cls:'t-act'},
    {key:'standard', label:'Standard', cls:'t-std'},
    {key:'bonus', label:'Bonus', cls:'t-bon'},
  ];
  let html = renderDays();

  if(dk===todayKey()){

      html += `<div class="card warn"><b style="font-size:16px">Diese Woche liegengeblieben</b>
        <div class="small" style="margin:4px 0 8px">Antippen = heute nachholen. Nachgeholt zählt voll — kein Drama.</div>` +

      `</div>`;
    }

  if(dow===1){
    html += `<div class="card note"><b style="font-size:16px">Gestern Long Run gewesen?</b>
      <div class="feelrow">
        <button class="feelbtn ${S.regenMo[dk]?'sel':''}" onclick="setRegen('${dk}',true)">Ja → Regen-Tag</button>

  if(dk===todayKey() && new Date().getHours()>=16){
    const tm = new Date(); tm.setDate(tm.getDate()+1);

      <div class="blocklabel" style="font-size:13px;text-transform:uppercase;letter-spacing:.09em;color:var(--accent)">Abend-Ritual</div>
      <div class="headline" style="margin:4px 0 2px">Dein Plan für morgen steht →</div>
      <div class="small">${esc(DATA.briefings[tk].headline)}</div></div>`;
  }
  html += `<div class="card" style="margin-top:18px;border-style:dashed">
    <div class="blocklabel" style="font-size:13px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)">Spruch des Tages</div>
    <div class="serif" style="font-size:18px;margin-top:5px;line-height:1.45">${esc(spruchFuer(dk))}</div>
  </div>`;
  document.getElementById('view-heute').innerHTML = html;
}

/* ================= RENDER: WOCHE ================= */
function calcCoverage(){
  const ws = getWeekStart(todayKey());
  const counts = {};
  for(let i=0;i<7;i++){
    const d = new Date(ws); d.setDate(ws.getDate()+i);
    const dk = todayKey(d);
    tasksForDay(dk).forEach(t=>{
      if(isDone(t.id,dk)) (t.problems||[]).forEach(p=>counts[p]=(counts[p]||0)+1);
    });
  }
  return counts;
}

/* ================= RENDER: TAGEBUCH ================= */
function parseEntry(text){
  const t = text.toLowerCase();
  let km=null, m=t.match(/(\d+[.,]?\d*)\s*(?:km|kilometer)/); if(m) km=parseFloat(m[1].replace(',','.'));
  let dauer=null;
  m=t.match(/(\d+):(\d{2})/); if(m) dauer=parseInt(m[1])*60+parseInt(m[2]);
  if(dauer==null){ m=t.match(/(\d+)\s*(?:min|minuten)/); if(m) dauer=parseInt(m[1]); }
  if(dauer==null){ m=t.match(/(\d+[.,]?\d*)\s*stunden?/); if(m) dauer=Math.round(parseFloat(m[1].replace(',','.'))*60); }
  const pain=(word)=>{ const mm=t.match(new RegExp(word+'\\D{0,14}?(\\d+)')); if(mm){const v=parseInt(mm[1]); if(v<=10) return v;} return null; };
  // Lauf-Indizien schlagen beiläufige Wort-Treffer ("hatte keine Kraft mehr")
  const laufHit = /intervall|long ?run|langer lauf|tempolauf|zone ?2|gelaufen|gejoggt|laufen|\blauf\b/.test(t) || km!=null;
  let art='Training';
  if(/intervall/.test(t)) art='Intervall';
  else if(/long ?run|langer lauf/.test(t)) art='Long Run';
  else if(laufHit) art='Lauf';
  else if(/krafttraining|\bkraft\b|hantel|gym|coach-plan/.test(t)) art='Kraft';
  else if(/rad ?fahr|fahrrad|schwimm/.test(t)) art='Rad/Schwimmen';
  else if(/ruhetag|pausentag/.test(t)) art='Ruhetag';
  let rpe=null; m=t.match(/(?:anstrengung|rpe)\D{0,10}?(\d+)/); if(m && parseInt(m[1])<=10) rpe=parseInt(m[1]);
  // "gestern" nur am Anfang werten — "besser als gestern" mitten im Satz verschiebt das Datum nicht
  let offset=0;
  const vg = t.search(/vorgestern/);
  const g = t.search(/(^|[^r])gestern/);
  if(vg>-1 && vg<30) offset=2;
  else if(g>-1 && g<30) offset=1;
  const d=new Date(); d.setDate(d.getDate()-offset);
  return { datum:todayKey(d), offset, art, km, dauer, rpe, knie:pain('knie'), achilles:pain('achill') };
}
let vLock = { tag:false, art:false };
function vUpdate(){
  const ta = document.getElementById('v-text');
  if(!ta) return;
  const p = parseEntry(ta.value);
  const tagSel = document.getElementById('v-tag'), artSel = document.getElementById('v-art');
  if(tagSel && !vLock.tag) tagSel.value = String(p.offset);
  if(artSel && !vLock.art) artSel.value = p.art;
  const er = document.getElementById('v-erkannt');
  if(er){
    const teile = [p.km!=null? p.km+' km':null, p.dauer!=null? p.dauer+' min':null,
      p.rpe!=null? 'Anstrengung '+p.rpe:null, p.knie!=null? 'Knie '+p.knie+'/10':null,
      p.achilles!=null? 'Achilles '+p.achilles+'/10':null].filter(Boolean);
    er.textContent = ta.value.trim()? (teile.length? 'Außerdem erkannt: '+teile.join(' · ') : 'Tippe oder sprich weiter — Zahlen erkenne ich automatisch.') : '';
  }
}

function toggleMic(){
  if(recActive){ try{rec.stop();}catch(e){} return; }
  try{
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    rec = new SR(); rec.lang='de-DE'; rec.continuous=true; rec.interimResults=true;
    const ta = document.getElementById('v-text');
    const base = ta.value? ta.value.trim()+' ' : '';
    rec.onresult = ev=>{
      let fin='', interim='';
      for(let i=0;i<ev.results.length;i++){
        if(ev.results[i].isFinal) fin += ev.results[i][0].transcript+' ';
        else interim += ev.results[i][0].transcript;
      }
      ta.value = (base+fin+interim).trim();
      vUpdate();
    };
    rec.onstart = ()=>{ recActive=true; updateMicUI(); };
    rec.onend = ()=>{ recActive=false; updateMicUI(); };
    rec.onerror = ()=>{ recActive=false; updateMicUI(); };
    rec.start();
  }catch(e){
    const w=document.getElementById('micwrap'); if(w) w.style.display='none';

/* ================= RENDER: TRENDS ================= */
function sparkSVG(vals, color){
  const w=300, h=54, pad=4;
  const mn=Math.min(...vals), mx=Math.max(...vals);
  const x=i=> pad + i*(w-2*pad)/(vals.length-1);
  const y=v=> mx===mn? h/2 : h-pad-(v-mn)*(h-2*pad)/(mx-mn);
  const pts = vals.map((v,i)=>x(i).toFixed(1)+','+y(v).toFixed(1)).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${x(vals.length-1)}" cy="${y(vals[vals.length-1])}" r="3.5" fill="${color}"/></svg>`;
}
function isoWeek(dk){ const d=parseLocal(dk); const ws=getWeekStart(dk); return todayKey(ws); }

    const series = [
      {key:'hrv', name:'HRV (Wochenschnitt)', unit:'ms', color:'#2a7a8a', goodUp:true},
      {key:'rhr', name:'Ruhepuls', unit:'bpm', color:'#d63a17', goodUp:false},
      {key:'schlaf', name:'Schlaf', unit:'h', color:'#1c4a6c', goodUp:true},
    ];
    html += '<h2>Körper-Trends</h2>';
    for(const s of series){

      const last = vals[vals.length-1], first = vals[0];
      html += `<div class="spark"><div class="sl"><b>${s.name}</b><span class="sv">${last} ${s.unit}</span></div>
